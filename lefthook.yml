pre-commit:
  commands:
    gitleaks:
      glob: "**/*"
      run: gitleaks git --pre-commit --staged
    oxfmt:
      root: "packages/core/"
      run: pnpm exec oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    oxlint:
      root: "packages/core/"
      run: pnpm exec oxlint --fix --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
