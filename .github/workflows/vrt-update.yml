name: VRT Update

# Auto-heals Linux VRT baselines on main after a PR with intentional visual
# changes lands: runs `pnpm test:vrt:update`, then — if baselines actually
# changed — opens a PR via peter-evans/create-pull-request with signed
# commits (Verified, authored by `github-actions[bot]`), and merges it via
# the GitHub CLI using the default GITHUB_TOKEN. That merge doesn't
# re-trigger CI (GITHUB_TOKEN-driven events don't cascade), so the merge
# commit that introduced the visual change keeps its red vrt check as a
# historical marker; anyone wanting a fresh check on the baseline update
# commit can re-run CI manually from the Actions tab.
#
# Bootstrapping is automatic: this workflow's own file is under the paths
# filter, so the very first push landing vrt-update.yml on main triggers a
# run that seeds the initial baselines.

permissions: {}

defaults:
  run:
    shell: bash

on:
  push:
    branches: [main]
    paths:
      - "packages/core/**"
      - ".github/workflows/vrt-update.yml"
      - ".github/actions/setup/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      # Needed by create-pull-request to push the branch and by `gh pr
      # merge` to merge it.
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - run: pnpm --filter @ps1ui/core exec playwright install --with-deps

      # `-u` sets updateSnapshot=all and the script scopes to --project vrt,
      # so inline snapshots in unit/storybook tests won't be rewritten.
      # Vitest exits 0 in this mode even when baselines are missing (they get
      # generated), so any non-zero here is a real failure worth surfacing.
      - run: pnpm --filter @ps1ui/core test:vrt:update

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # No diff -> no PR, and pull-request-number stays empty, which
          # skips the merge step below.
          sign-commits: true
          commit-message: "chore: Update VRT baselines"
          title: "chore: Update VRT baselines"
          body: >-
            Auto-generated by the VRT Update workflow after
            `pnpm test:vrt:update` produced changed baselines on `main`.
          branch: chore/update-vrt-baselines
          delete-branch: true

      - name: Merge Pull Request
        if: ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --delete-branch
