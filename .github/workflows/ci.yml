name: CI

permissions: {}

defaults:
  run:
    shell: bash

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - parallel:
          - run: pnpm --filter @ps1ui/core lint
          - run: pnpm --filter @ps1ui/core fmt:check
      - run: pnpm --filter @ps1ui/core build
      - run: pnpm --filter @ps1ui/core exec playwright install
      # Scoped to `unit` + `storybook` — VRT lives in its own workflow
      # (.github/workflows/vrt.yml) so its expected-red-on-new-baseline
      # signal doesn't muddy this workflow's "did lint/build/unit pass?"
      # semantics.
      - run: pnpm --filter @ps1ui/core test:ci
