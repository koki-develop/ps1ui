name: CI

permissions: {}

defaults:
  run:
    shell: bash

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - parallel:
          - run: pnpm --filter @ps1ui/core lint
          - run: pnpm --filter @ps1ui/core fmt:check
      - run: pnpm --filter @ps1ui/core build
      - run: pnpm --filter @ps1ui/core exec playwright install
      # Scoped to `unit` + `storybook` — VRT runs as its own parallel job
      # (see `vrt` below) so its browser matrix doesn't serialize behind
      # lint/build and a baseline refresh only re-runs the VRT lane.
      - run: pnpm --filter @ps1ui/core test:ci

  vrt:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm --filter @ps1ui/core exec playwright install --with-deps
      - run: pnpm --filter @ps1ui/core test:vrt
      # On failure (mismatch OR missing reference), upload the -actual /
      # -diff PNG pair Vitest wrote to .vitest-attachments/ so a reviewer
      # can see what changed. Retention capped so old artifacts don't
      # accumulate against the repo storage quota.
      - name: Upload VRT diff artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vrt-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: packages/core/.vitest-attachments/
          retention-days: 14
          if-no-files-found: warn
