name: Release Please

permissions: {}

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write # for creating releases
      issues: write # for creating labels
      pull-requests: write # for creating pull requests
    outputs:
      # core
      core-release-created: ${{ steps.release-please.outputs['packages/core--release_created'] }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json

  release-core:
    needs: release-please
    if: needs.release-please.outputs['core-release-created'] == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for OIDC authentication to npm registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - run: echo 'registry=https://registry.npmjs.org' > .npmrc
      - run: npm publish --access public
        working-directory: packages/core
