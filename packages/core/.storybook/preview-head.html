<!--
  Storybook's built-in base-preview-head.html hardcodes `background-color: white`
  on `.sb-preparing-story` / `.sb-preparing-docs` — story-switch overlay elements
  at z-index 2147483647 that would flash white during transitions. These live
  outside the ps1ui canvas so base.css can't reach them.
-->
<style>
  .sb-preparing-story,
  .sb-preparing-docs {
    background: var(--ps1ui-color-bg);
  }
</style>
